  // ---------- lifecycle ----------
  constructor(props){
    super(props);
    this.state = {
      data: this.load(),
      view: 'dash',
      goalForm: null,
      rewardForm: null,
      histWeek: null,
      chessDraft: { games:'', minutes:'', result:'', notes:'' },
      settings: false,
      achForm: null,
      habitForm: null,
      shopTab: 'rewards',
      narrow: (typeof window!=='undefined' && window.innerWidth<760),
      t: 0
    };
  }

  load(){
    try {
      const raw = localStorage.getItem(this.KEY);
      if (raw) { const d = JSON.parse(raw); return this.migrate(d); }
    } catch(e){}
    return this.seed();
  }
  seed(){
    const wk = this.mondayKey(new Date());
    return {
      version: 2,
      createdAt: this.dateKey(new Date()),
      currentWeek: wk,
      weekStart: { [wk]: wk },
      goals: { [wk]: [] },
      rewards: this.DEFAULT_REWARDS.map(r=>({...r})),
      potions: this.DEFAULT_POTIONS.map(p=>({...p})),
      badHabits: this.DEFAULT_BADHABITS.map(b=>({...b})),
      habitLog: [],
      hp: null,
      claims: [],
      chessPlan: this.CHESS_PLAN.slice(),
      chess: { logs: [] },
      reviews: {},
      activeDates: {},
      achievements: {},
      customAch: [],
      dailyNotes: {},
      focus: null,
      muted: false,
      theme: 'light'
    };
  }
  migrate(d){
    d.weekStart = d.weekStart || {};
    d.goals = d.goals || {};
    d.rewards = d.rewards || this.DEFAULT_REWARDS.map(r=>({...r}));
    d.potions = d.potions || this.DEFAULT_POTIONS.map(p=>({...p}));
    d.badHabits = d.badHabits || this.DEFAULT_BADHABITS.map(b=>({...b}));
    d.habitLog = d.habitLog || [];
    if (d.hp === undefined) d.hp = null;
    d.claims = d.claims || [];
    d.chessPlan = d.chessPlan || this.CHESS_PLAN.slice();
    d.chess = d.chess || { logs: [] };
    d.reviews = d.reviews || {};
    d.activeDates = d.activeDates || {};
    d.achievements = d.achievements || {};
    d.customAch = d.customAch || [];
    d.dailyNotes = d.dailyNotes || {};
    if (d.focus === undefined) d.focus = null;
    d.theme = d.theme || 'light';
    if (!d.currentWeek){ const wk=this.mondayKey(new Date()); d.currentWeek=wk; d.goals[wk]=d.goals[wk]||[]; d.weekStart[wk]=wk; }
    return d;
  }
  persist(){ try { localStorage.setItem(this.KEY, JSON.stringify(this.state.data)); } catch(e){} }

  // ---------- date helpers ----------
  dateKey(dt){ const d=new Date(dt); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  mondayKey(dt){ const d=new Date(dt); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return this.dateKey(d); }
  parseKey(k){ const [y,m,dd]=k.split('-').map(Number); return new Date(y,m-1,dd); }
  addDays(k,n){ const d=this.parseKey(k); d.setDate(d.getDate()+n); return this.dateKey(d); }
  todayIdx(){ return (new Date().getDay()+6)%7; }
  weekLabel(wk){
    const s=this.parseKey(wk), e=this.parseKey(this.addDays(wk,6));
    const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return s.getDate()+' '+mo[s.getMonth()]+' – '+e.getDate()+' '+mo[e.getMonth()];
  }

  // ---------- goal completion math ----------
  goalUnits(g){ // {done, total, complete}
    if (g.type==='daily'){ const done=(g.checks||[]).filter(Boolean).length; const total=g.targetDays||7; return {done, total, complete: done>=total}; }
    if (g.type==='count'){ const done=g.count||0; const total=g.target||1; return {done, total, complete: done>=total}; }
    return { done: g.done?1:0, total:1, complete: !!g.done };
  }
  goalEarned(g){ // positive xp earned so far
    if (g.type==='daily') return ((g.checks||[]).filter(Boolean).length)*g.xp;
    if (g.type==='count') return (g.count||0)*g.xp;
    return g.done ? g.xp : 0;
  }

  // ---------- big stats compute ----------
  stats(){
    const d = this.state.data;
    let earnedXP=0, penaltyXP=0, curRiskXP=0;
    const areaEarned = {}; this.AREAS.forEach(a=>areaEarned[a.id]=0);
    const weekXP = {}; // wk -> earned this week
    const weekPct = {}; // wk -> completion %
    const byTitle = {}; // goal title -> cumulative units done (all weeks)
    let perfectWeeks=0, unitsEver=0;

    Object.keys(d.goals).forEach(wk=>{
      const goals = d.goals[wk]||[];
      let wkEarn=0, wkDoneU=0, wkTotU=0;
      const closed = wk !== d.currentWeek;
      goals.forEach(g=>{
        const u=this.goalUnits(g), earn=this.goalEarned(g);
        wkEarn+=earn; earnedXP+=earn;
        areaEarned[g.areaId]=(areaEarned[g.areaId]||0)+earn;
        unitsEver += u.done;
        const tk=(g.title||'').trim().toLowerCase(); if(tk) byTitle[tk]=(byTitle[tk]||0)+u.done;
        wkDoneU += Math.min(u.done,u.total); wkTotU += u.total;
        if (g.priority==='main' && !u.complete){
          const pen = g.penalty||0;
          if (closed) penaltyXP += pen; else curRiskXP += pen;
        }
      });
      weekXP[wk]=wkEarn;
      const pct = wkTotU>0 ? Math.round(wkDoneU/wkTotU*100) : 0;
      weekPct[wk]=pct;
      if (wkTotU>0 && pct>=100 && goals.length>0) perfectWeeks++;
    });

    // chess xp
    let chessGames=0, chessMin=0, chessXP=0;
    (d.chess.logs||[]).forEach(l=>{ chessGames+=(+l.games||0); chessMin+=(+l.minutes||0); chessXP += (+l.games||0)*5 + Math.floor((+l.minutes||0)/5)*2; });
    earnedXP += chessXP; areaEarned.cre += chessXP;

    // reflection xp
    const reflections = Object.values(d.reviews).filter(r=>r&&r.done).length;
    earnedXP += reflections*60;

    const spent = (d.claims||[]).reduce((a,c)=>a+(c.cost||0),0);
    const coins = earnedXP - spent;

    const lvl = this.levelInfo(earnedXP);
    const maxHP = this.maxHP(lvl.level);
    const hp = (d.hp==null) ? maxHP : Math.max(0, Math.min(maxHP, d.hp));
    const hpPct = Math.round(hp/maxHP*100);
    const tier = this.tierFor(lvl.level);

    // streak
    const { streak, best } = this.streakInfo(d.activeDates);

    // area levels
    const areaLvl={}; let maxAreaLvl=0, areasAt2=0;
    this.AREAS.forEach(a=>{ const li=this.areaLevelInfo(areaEarned[a.id]||0); areaLvl[a.id]=li; if(li.level>maxAreaLvl)maxAreaLvl=li.level; if(li.level>=2)areasAt2++; });

    const cwk=d.currentWeek;
    return {
      earnedXP, penaltyXP, curRiskXP, spent, coins, available:coins,
      hp, maxHP, hpPct, tier,
      level:lvl.level, into:lvl.into, need:lvl.need, rank:this.rankFor(lvl.level),
      streak, bestStreak:best,
      areaEarned, areaLvl, maxAreaLvl, areasAt2,
      weekXP, weekPct, perfectWeeks, unitsEver,
      chessGames, chessMin, chessXP,
      reflections,
      rewardsClaimed:(d.claims||[]).length,
      goalUnitsByTitle: byTitle,
      curPct: weekPct[cwk]||0
    };
  }
  levelInfo(xp){ let lvl=1, rem=xp; for(;;){ const need=90+lvl*45; if(rem>=need){rem-=need;lvl++;} else return {level:lvl,into:rem,need}; } }
  areaLevelInfo(xp){ let lvl=1, rem=xp; for(;;){ const need=50+lvl*30; if(rem>=need){rem-=need;lvl++;} else return {level:lvl,into:rem,need}; } }
  rankFor(l){ let r=this.RANKS[0]; this.RANKS.forEach(x=>{ if(l>=x.min)r=x; }); return r.name; }
  streakInfo(dates){
    const keys=Object.keys(dates||{}).filter(k=>dates[k]).sort();
    if(!keys.length) return {streak:0,best:0};
    const set=new Set(keys);
    // best
    let best=0,run=0,prev=null;
    keys.forEach(k=>{ if(prev && this.addDays(prev,1)===k) run++; else run=1; best=Math.max(best,run); prev=k; });
    // current (ending today or yesterday)
    const today=this.dateKey(new Date());
    let cur=0, cursor= set.has(today)?today:(set.has(this.addDays(today,-1))?this.addDays(today,-1):null);
    while(cursor && set.has(cursor)){ cur++; cursor=this.addDays(cursor,-1); }
    return {streak:cur, best};
  }

  // ---------- mutations ----------
  markToday(){ this.state.data.activeDates[this.dateKey(new Date())]=true; }
  curHP(){ const s=this.stats(); return s.hp; }
  ensureHP(){ const d=this.state.data; if(d.hp==null) d.hp=this.maxHP(this.stats().level); }
  damageHP(amount){ const d=this.state.data; this.ensureHP(); d.hp=Math.max(0, d.hp-amount); }
  healHP(amount){ const d=this.state.data; this.ensureHP(); const mx=this.maxHP(this.stats().level); d.hp=Math.min(mx, d.hp+amount); }
  commit(before, fx){
    const s=this.stats();
    if(before && s.level>before.level){ this.state.data.hp=this.maxHP(s.level); this.levelUpFx(s.level, s.rank); this.sound('level'); }
    this.checkAch(s);
    this.persist();
    this.setState({t:Date.now()});
    if(fx) fx();
  }
  curGoals(){ const d=this.state.data; return d.goals[d.currentWeek]||[]; }

  toggleDay(g,i){
    const before=this.stats();
    g.checks=g.checks||Array(7).fill(false);
    const was=g.checks[i]; g.checks[i]=!was;
    if(g.checks[i]){ this.markToday(); this.sound('tick'); }
    this.commit(before, ()=>{ if(g.checks[i]) this.celebrate('+'+g.xp+' XP', this.areaColor(g.areaId)); });
  }
  incCount(g,delta){
    const before=this.stats();
    g.count=Math.max(0,(g.count||0)+delta);
    if(delta>0){ this.markToday(); this.sound('tick'); }
    this.commit(before, ()=>{ if(delta>0) this.celebrate('+'+g.xp+' XP', this.areaColor(g.areaId)); });
  }
  toggleWeekly(g){
    const before=this.stats();
    g.done=!g.done;
    if(g.done){ this.markToday(); this.sound('tick'); }
    this.commit(before, ()=>{ if(g.done) this.celebrate('+'+g.xp+' XP', this.areaColor(g.areaId)); });
  }

  saveGoal(f){
    const d=this.state.data; const arr=d.goals[d.currentWeek];
    const g={
      id: f.id||('g'+Date.now()+Math.random().toString(36).slice(2,6)),
      areaId:f.areaId, title:f.title.trim(), priority:f.priority, type:f.type,
      xp:Math.max(0,+f.xp||0),
      penalty: f.priority==='main'?Math.max(0,+f.penalty||0):0,
      targetDays: f.type==='daily'?Math.min(7,Math.max(1,+f.targetDays||7)):undefined,
      target: f.type==='count'?Math.max(1,+f.target||1):undefined,
    };
    if(f.id){ const i=arr.findIndex(x=>x.id===f.id); const old=arr[i]; g.checks=old.checks; g.count=old.count; g.done=old.done; arr[i]=g; }
    else { if(g.type==='daily')g.checks=Array(7).fill(false); if(g.type==='count')g.count=0; if(g.type==='weekly')g.done=false; arr.push(g); }
    this.setState({goalForm:null}); this.commit(null);
  }
  deleteGoal(id){ const d=this.state.data; d.goals[d.currentWeek]=d.goals[d.currentWeek].filter(g=>g.id!==id); this.setState({goalForm:null}); this.commit(null); }

  importSuggested(){
    const d=this.state.data; const arr=d.goals[d.currentWeek];
    this.SUGGESTED.forEach(([areaId,title,type,xp,tv,priority])=>{
      const g={ id:'g'+Date.now()+Math.random().toString(36).slice(2,7), areaId, title, priority, type, xp,
        penalty: priority==='main'?Math.round(xp*0.6):0 };
      if(type==='daily'){ g.targetDays=tv; g.checks=Array(7).fill(false); }
      else if(type==='count'){ g.target=tv; g.count=0; }
      else g.done=false;
      arr.push(g);
    });
    this.commit(null);
  }

  claimReward(r){
    const s=this.stats(); if(s.coins < r.cost || s.level < (r.minLevel||1)) return;
    const before=this.stats();
    this.state.data.claims.push({ id:'c'+Date.now(), type:'reward', rewardId:r.id, name:r.name, cost:r.cost, date:this.dateKey(new Date()) });
    this.sound('coin');
    this.commit(before, ()=>this.celebrate('−'+r.cost+' monedas · '+r.name, this.C.gold, true));
  }
  buyPotion(p){
    const s=this.stats(); if(s.coins < p.cost || s.hp >= s.maxHP) return;
    const healed = p.heal>=9999 ? (s.maxHP - s.hp) : Math.min(p.heal, s.maxHP - s.hp);
    const before=this.stats();
    this.ensureHP(); this.state.data.hp = s.hp + healed;
    this.state.data.claims.push({ id:'c'+Date.now(), type:'potion', name:p.name, cost:p.cost, date:this.dateKey(new Date()) });
    this.sound('heal');
    this.commit(before, ()=>this.celebrate('+'+healed+' ♥ '+p.name, this.C.green));
  }
  openRewardForm(r, kind){ kind = kind || (r&&r.heal!==undefined?'potion':'reward'); this.setState({rewardForm: r?{...r, kind, heal:r.heal||30, minLevel:r.minLevel||1}:{kind, name:'', cost: kind==='potion'?60:100, icon: kind==='potion'?'local_drink':'redeem', heal:30, minLevel:1}}); }
  saveReward(f){
    const d=this.state.data;
    if(f.kind==='potion'){
      const rec={ id:f.id||('p'+Date.now()), name:f.name.trim(), cost:Math.max(0,+f.cost||0), heal:Math.max(1,+f.heal||1), icon:f.icon||'local_drink' };
      if(f.id){ const i=d.potions.findIndex(x=>x.id===f.id); d.potions[i]=rec; } else d.potions.push(rec);
    } else {
      const rec={ id:f.id||('r'+Date.now()), name:f.name.trim(), cost:Math.max(0,+f.cost||0), minLevel:Math.max(1,+f.minLevel||1), icon:f.icon||'redeem' };
      if(f.id){ const i=d.rewards.findIndex(x=>x.id===f.id); d.rewards[i]=rec; } else d.rewards.push(rec);
    }
    this.setState({rewardForm:null}); this.commit(null);
  }
  deleteReward(id){ const d=this.state.data; d.rewards=d.rewards.filter(r=>r.id!==id); d.potions=(d.potions||[]).filter(p=>p.id!==id); this.setState({rewardForm:null}); this.commit(null); }

  // ---------- hábitos negativos ----------
  openHabitForm(b){ this.setState({habitForm: b?{...b}:{name:'',damage:12,icon:'block'}}); }
  saveHabit(f){ const d=this.state.data; d.badHabits=d.badHabits||[]; const rec={id:f.id||('b'+Date.now()),name:f.name.trim(),damage:Math.max(0,+f.damage||0),icon:f.icon||'block'}; if(f.id){const i=d.badHabits.findIndex(x=>x.id===f.id);d.badHabits[i]=rec;}else d.badHabits.push(rec); this.setState({habitForm:null}); this.commit(null); }
  deleteHabit(id){ const d=this.state.data; d.badHabits=(d.badHabits||[]).filter(x=>x.id!==id); d.habitLog=(d.habitLog||[]).filter(l=>l.habitId!==id); this.setState({habitForm:null}); this.commit(null); }
  logHabit(b){ const d=this.state.data; const before=this.stats(); this.damageHP(b.damage); d.habitLog.unshift({id:'hl'+Date.now(),habitId:b.id,name:b.name,damage:b.damage,date:this.dateKey(new Date())}); this.sound('hurt'); this.commit(before, ()=>this.celebrate('−'+b.damage+' ♥ '+b.name, this.C.danger)); }
  undoHabit(logId){ const d=this.state.data; const l=(d.habitLog||[]).find(x=>x.id===logId); if(!l)return; this.healHP(l.damage); d.habitLog=d.habitLog.filter(x=>x.id!==logId); this.commit(null); }
  habitCountWeek(id){ const d=this.state.data; const ws=d.currentWeek, we=this.addDays(ws,6); return (d.habitLog||[]).filter(l=>l.habitId===id && l.date>=ws && l.date<=we).length; }

  addChessLog(){
    const cd=this.state.chessDraft;
    if(!cd.games && !cd.minutes) return;
    const before=this.stats();
    const idx=this.todayIdx();
    this.state.data.chess.logs.unshift({
      id:'cl'+Date.now(), date:this.dateKey(new Date()), day:idx,
      theme:this.state.data.chessPlan[idx],
      games:+cd.games||0, minutes:+cd.minutes||0, result:cd.result||'', notes:(cd.notes||'').trim()
    });
    this.markToday(); this.sound('tick');
    const xp=(+cd.games||0)*5 + Math.floor((+cd.minutes||0)/5)*2;
    this.setState({chessDraft:{games:'',minutes:'',result:'',notes:''}});
    this.commit(before, ()=>{ if(xp>0) this.celebrate('+'+xp+' XP · Ajedrez', this.areaColor('cre')); });
  }
  delChessLog(id){ const d=this.state.data; d.chess.logs=d.chess.logs.filter(l=>l.id!==id); this.commit(null); }
  setPlan(i,v){ this.state.data.chessPlan[i]=v; this.setState({t:Date.now()}); this.persist(); }

  setReview(wk,k,v){ const d=this.state.data; d.reviews[wk]=d.reviews[wk]||{done:false}; d.reviews[wk][k]=v; this.setState({t:Date.now()}); this.persist(); }
  finishReview(wk){
    const r=this.state.data.reviews[wk]; if(!r) return;
    const answered=this.REVIEW_QS.filter(q=>(r[q.k]||'').trim()).length;
    if(answered<3){ return; }
    const before=this.stats();
    const wasDone=r.done; r.done=true;
    this.commit(before, ()=>{ if(!wasDone) this.celebrate('+60 XP · Revisión', this.C.primary); if(!wasDone) this.sound('level'); });
  }

  startNewWeek(copy){
    const d=this.state.data;
    const closing=d.goals[d.currentWeek]||[];
    let dmg=0; closing.forEach(g=>{ const u=this.goalUnits(g); if(g.priority==='main'&&!u.complete) dmg+=g.penalty||0; });
    if(dmg>0){ this.ensureHP(); d.hp=Math.max(0,d.hp-dmg); }
    const real=this.mondayKey(new Date());
    let next=this.addDays(d.currentWeek,7);
    if(this.parseKey(real) > this.parseKey(next)) next=real;
    d.weekStart[next]=next;
    if(copy){
      d.goals[next]=(d.goals[d.currentWeek]||[]).map(g=>{
        const n={...g, id:'g'+Date.now()+Math.random().toString(36).slice(2,6)};
        if(n.type==='daily')n.checks=Array(7).fill(false);
        if(n.type==='count')n.count=0;
        if(n.type==='weekly')n.done=false;
        return n;
      });
    } else d.goals[next]=[];
    d.currentWeek=next;
    this.setState({view:'metas', histWeek:null}); this.commit(null);
    if(dmg>0){ this.celebrate('−'+dmg+' ♥ metas principales', this.C.danger); this.sound('hurt'); }
    else this.celebrate('¡Nueva semana!', this.C.primary);
  }
  gotoWeek(wk){ this.state.data.currentWeek=wk; this.setState({view:'metas',histWeek:null}); this.commit(null); }

  // ---------- backup / respaldo ----------
  exportData(){
    try{
      const blob=new Blob([JSON.stringify(this.state.data,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download='mi-camino-respaldo-'+this.dateKey(new Date())+'.json';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    }catch(e){ alert('No se pudo exportar la copia.'); }
  }
  importData(file){
    if(!file) return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const parsed=JSON.parse(r.result);
      const md=this.migrate(parsed);
      this.setState({data:md, settings:false}, ()=>{ this.persist(); this.applyTheme(); });
      setTimeout(()=>{ this.celebrate('Copia restaurada', this.C.green); this.sound('level'); },150);
    }catch(e){ alert('El archivo no es una copia válida.'); } };
    r.readAsText(file);
  }
  resetAll(){
    if(!window.confirm('¿Borrar TODO tu progreso y empezar de cero? Esto no se puede deshacer. (Considera exportar una copia antes.)')) return;
    this.setState({data:this.seed(), settings:false}, ()=>{ this.persist(); this.applyTheme(); });
  }

  sound(kind){
    if(this.state.data.muted) return;
    try{
      const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
      this.ac=this.ac||new AC();
      const ac=this.ac; const now=ac.currentTime;
      const notes = kind==='level'?[523,659,784,1047] : kind==='coin'?[880,1175] : kind==='hurt'?[330,220] : kind==='heal'?[659,880] : [784,988];
      notes.forEach((f,i)=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type=kind==='coin'?'square':(kind==='hurt'?'sawtooth':'triangle'); o.frequency.value=f;
        const t=now+i*(kind==='level'?0.09:0.05);
        g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.11,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
        o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.24);
      });
    }catch(e){}
  }

  renderWeekDetail(wk,s){
    const h=this.h,C=this.C,d=this.state.data; const goals=d.goals[wk]||[]; const cur=wk===d.currentWeek;

      h('div',{style:{fontSize:'12px',fontWeight:800,color:C.muted,textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'10px'}},title), children);
    return this.overlay([
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}},
        h('h3',{style:{margin:0,fontFamily:'"Space Grotesk"',fontSize:'19px'}},'Ajustes'),
        h('button',{onClick:()=>this.setState({settings:false}),style:{color:C.faint}}, this.icon('close',22,C.faint))),
      sec('Respaldo de tu progreso', h('div',{},
        h('p',{style:{margin:'0 0 12px',fontSize:'13px',color:C.muted,fontWeight:500,lineHeight:1.5}},'Tus datos se guardan en este navegador. Descarga una copia para no perder tu progreso si cambias de equipo o borras datos.'),
        h('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap'}},
          h('button',{onClick:()=>this.exportData(),style:this.primaryBtn()}, this.icon('download',18,'#fff'),'Exportar copia'),
          h('label',{style:{...this.ghostBtn(),cursor:'pointer'}}, this.icon('upload',18,C.primary),'Importar copia',
            h('input',{type:'file',accept:'application/json,.json',style:{display:'none'},onChange:e=>{ this.importData(e.target.files[0]); e.target.value=''; }}))
        ))),
      sec('Apariencia', h('div',{style:{display:'flex',gap:'8px'}},
        [['light','Claro','light_mode'],['dark','Oscuro','dark_mode']].map(([v,lb,ic])=>{ const on=(d.theme||'light')===v;
          return h('button',{key:v,onClick:()=>{ if(!on)this.toggleTheme(); },style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',padding:'12px',borderRadius:'12px',fontWeight:700,fontSize:'13.5px',border:'2px solid '+(on?C.primary:C.line2),background:on?C.primarySoft:C.card,color:on?C.primaryD:C.muted}}, this.icon(ic,19,on?C.primary:C.faint,on), lb);
        }))),
      sec('Sonido', h('button',{onClick:()=>{ d.muted=!d.muted; this.setState({t:Date.now()}); this.persist(); },style:{...this.ghostBtn(),width:'100%',justifyContent:'center'}}, this.icon(d.muted?'volume_off':'volume_up',18,C.text), d.muted?'Sonido desactivado — toca para activar':'Sonido activado — toca para silenciar')),
      sec('Zona de riesgo', h('button',{onClick:()=>this.resetAll(),style:{...this.ghostBtn(),width:'100%',justifyContent:'center',color:C.danger,borderColor:C.danger+'55'}}, this.icon('restart_alt',18,C.danger),'Borrar todo y empezar de cero'))
    ], ()=>this.setState({settings:false}));
  }
  renderAchModal(){
    const h=this.h,C=this.C,f=this.state.achForm; const d=this.state.data; const set=(k,v)=>this.setState({achForm:{...f,[k]:v}});
    const icons=['star','military_tech','emoji_events','local_fire_department','menu_book','fitness_center','self_improvement','chess','savings','bolt','verified','diamond'];
    const titles=[...new Set(Object.values(d.goals).flat().map(g=>(g.title||'').trim()).filter(Boolean))];
    const metrics=[['goal','Completar una meta X veces'],['streak','Días de racha (récord)'],['level','Nivel alcanzado'],['xp','XP total ganado'],['chess','Partidas de ajedrez']];
    const valid=f.name.trim().length>0 && (f.metric!=='goal' || (f.goalTitle||'').trim().length>0);
    const unit={goal:'veces',streak:'días',level:'nivel',xp:'XP',chess:'partidas'}[f.metric];
    return this.overlay([
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'18px'}},
        h('h3',{style:{margin:0,fontFamily:'"Space Grotesk"',fontSize:'19px'}}, f.id?'Editar logro':'Nuevo logro'),
        h('button',{onClick:()=>this.setState({achForm:null}),style:{color:C.faint}}, this.icon('close',22,C.faint))),
      h('div',{style:{display:'grid',gap:'15px'}},
        this.field('Nombre del logro', h('input',{value:f.name,autoFocus:true,placeholder:'Ej: 100 páginas leídas',onChange:e=>set('name',e.target.value),style:this.inp()})),
        this.field('¿Qué debe medir?', h('select',{value:f.metric,onChange:e=>set('metric',e.target.value),style:this.inp()}, metrics.map(([v,lb])=>h('option',{key:v,value:v},lb)))),
        f.metric==='goal'?this.field('¿Cuál meta?', titles.length?h('select',{value:f.goalTitle,onChange:e=>set('goalTitle',e.target.value),style:this.inp()}, [h('option',{key:'_',value:''},'Elige una meta...'), ...titles.map(t=>h('option',{key:t,value:t},t))]):h('input',{value:f.goalTitle,placeholder:'Escribe el nombre exacto de la meta',onChange:e=>set('goalTitle',e.target.value),style:this.inp()})):null,
        this.field('Meta a alcanzar ('+unit+')', h('input',{type:'number',min:1,value:f.target,onChange:e=>set('target',e.target.value),style:this.inp()})),
        this.field('Ícono', h('div',{style:{display:'flex',flexWrap:'wrap',gap:'7px'}},
          icons.map(ic=>{ const on=f.icon===ic;
            return h('button',{key:ic,onClick:()=>set('icon',ic),style:{width:'42px',height:'42px',borderRadius:'11px',display:'grid',placeItems:'center',border:'2px solid '+(on?C.gold:C.line2),background:on?C.goldSoft:C.card}}, this.icon(ic,20,on?C.gold:C.muted,on));
          }))),
        h('div',{style:{fontSize:'12px',color:C.faint,fontWeight:600,lineHeight:1.4}},'Se desbloqueará solo cuando alcances la cifra. Las metas se cuentan por sus casillas/veces completadas sumando todas las semanas.'),
        h('div',{style:{display:'flex',gap:'10px',marginTop:'4px'}},
          f.id?h('button',{onClick:()=>this.deleteCustomAch(f.id),style:{...this.ghostBtn(),color:C.danger,borderColor:C.dangerSoft}}, this.icon('delete',18,C.danger),'Eliminar'):null,
          h('button',{onClick:()=>valid&&this.saveCustomAch(f),disabled:!valid,style:{...this.primaryBtn(),flex:1,justifyContent:'center',opacity:valid?1:.5}}, this.icon('check',19,'#fff'), f.id?'Guardar':'Crear logro'))
      )
    ], ()=>this.setState({achForm:null}));
  }

  field(label,control){ const h=this.h,C=this.C; return h('label',{style:{display:'block'}},
    h('span',{style:{display:'block',fontSize:'12px',fontWeight:700,color:C.muted,marginBottom:'6px',letterSpacing:'.2px'}},label), control); }
  inp(){ const C=this.C; return {width:'100%',padding:'11px 13px',borderRadius:'11px',border:'1px solid '+C.line2,background:C.card2,fontSize:'14px',fontWeight:600,outline:'none',color:C.text}; }
  primaryBtn(){ const C=this.C; return {display:'inline-flex',alignItems:'center',gap:'7px',padding:'11px 17px',borderRadius:'12px',background:'linear-gradient(135deg,'+C.primary+',#8B5CF6)',color:'#fff',fontWeight:700,fontSize:'13.5px',boxShadow:'0 6px 18px '+C.primaryGlow}; }
  ghostBtn(){ const C=this.C; return {display:'inline-flex',alignItems:'center',gap:'7px',padding:'11px 15px',borderRadius:'12px',background:C.card,border:'1px solid '+C.line2,color:C.text,fontWeight:700,fontSize:'13.5px'}; }
}
</script>
</body>
</html>
